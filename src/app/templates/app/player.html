{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер | Yang</title>
    <link rel="stylesheet" href="{% static 'app/css/style.css'%}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="{% static 'app/css/player.css'%}">
    <script src="{% static 'app/js/player.js'%}" defer></script>
</head>

<body>
    <header>
        <div class="logo">
            <div class="logo-icon"></div>
        </div>
        <nav>
            <a href="/">Главная</a>
            <a href="/artists/">Артисты</a>
            <a href="/albums/">Альбомы</a>
            <a href="/tracks/">Треки</a>
            <a href="/player/" class="active">Плеер</a>
            <a href="/favorites/">Избранное</a>
        </nav>
        <div class="search-bar">
            <span></span>
            <input type="text" placeholder="Поиск треков, артистов.." id="serchInput">
        </div>
    </header>
    <main>
        <div class="player-card">
            <div class="cover">
                <i class="ti ti-music"></i>
            </div>

            <p class="song-title">{{ song.title }}</p>
            <p class="song-artist">{{ song.artist }}</p>

            <audio id="audio" src="/media/ОГНЕЙ.m4a" preload="metadata" type="audio/m4a"></audio>

            <input type="range" id="progress" min="0" max="100" value="0">
            <div class="time-row">
                <span id="cur">0:00</span>
                <span id="dur">0:00</span>
            </div>

            <div class="controls">
                <button class="btn-ctrl" id="prevBtn"><i class="ti ti-player-skip-back"></i></button>
                <button class="btn-play" id="playBtn">
                    <i class="ti ti-player-play" id="playIcon"></i>
                </button>
                <button class="btn-ctrl" id="nextBtn"><i class="ti ti-player-skip-forward"></i></button>
            </div>

            <div class="volume-row">
                <i class="ti ti-volume-2"></i>
                <input type="range" id="volume" min="0" max="100" value="70">
                <i class="ti ti-volume"></i>
            </div>
        </div>
    </main>
</body>

</html>
