{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный сервис Yang</title>
    <link rel="stylesheet" href="{% static 'app/css/style.css'%}">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon"></div>
        </div>
        <nav>
            <a href="/" class="active">Главная</a>
            <a href="/artists/">Артисты</a>
            <a href="/albums/">Альбомы</a>
            <a href="/tracks/">Треки</a>
            <a href="/favorites/">Избранное</a>
        </nav>
        <div class="search-bar">
            <span></span>
            <input type="text" placeholder="Поиск треков, артистов.." id="serchInput">
        </div>
    </header>
    <main>
    <div class="hero">
        <div>
            <h1>Добро пожаловать в Yang</h1>
            <p>Любая музыка на ваш вкус, собрано множество различных плейлистов. Слушай и наслаждайся музыкой.</p>
            <button class="hero-btn" onclick="shufflePlay()">▶ Слушать микс</button>
        </div>
    </div>
    <div class="section-title">
        Популярные Плейлисты
        <span class="line"></span>
    </div>

    <div>
    <div class="section-title">
        Сейчас в тренде
        <span class="line"></span>
    </div>
    </div>
    <div class="track-list" id="trackList"></div>
    </main>
</body>
</html>
